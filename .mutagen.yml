sync:
  defaults:
    ignore:
      vcs: true
      paths:
        - node_modules/
        - .git/
        - .env
        - dist/
        - build/
        - coverage/
        - tmp/
        - .cache/
        - target/            # rust
        - vendor/            # go vendoring
        - .mutagen-session
        - **/*.log
        - **/.DS_Store          # Recursive .DS_Store files
        - ._*                   # macOS resource fork files
        - **/._*                # Recursive resource fork files
